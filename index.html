<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ヘアーズ旬</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f5f5f5;
      text-align: center;
      overflow-x: hidden;
    }

    header {
      background: black;
      color: white;
      padding: 30px 20px;
      position: relative;
    }

    header h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 2px;
    }

    /* ハンバーガー */
    .hamburger {
      width: 30px;
      height: 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 200;
    }

    .hamburger span {
      display: block;
      height: 4px;
      background: white;
      border-radius: 2px;
      transition: 0.3s;
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    /* サイドバー */
    #sidebar {
      position: fixed;
      top: 0;
      right: -220px;
      width: 220px;
      height: 100%;
      background: white;
      box-shadow: 3px 0 10px rgba(0,0,0,0.2);
      z-index: 150;
      transition: 0.3s;
      padding-top: 60px;
      text-align: left;
    }

    #sidebar a {
      display: block;
      padding: 15px 20px;
      color: black;
      text-decoration: none;
      border-bottom: 1px solid #eee;
      font-size: 16px;
    }

    #sidebar a:hover {
      background: #f0f0f0;
    }

    #sidebar.active {
      left: 0;
    }

    img {
      width: 100%;
      height: auto;
    }

    .container {
      padding: 20px;
    }

    .shop {
      background: white;
      margin: 20px auto;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .shop h2 {
      margin-bottom: 10px;
    }

    .shop p {
      font-size: 14px;
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-size: 14px;
    }

    .subbtn {
      background: #555;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-group a {
      flex: 1;
      max-width: 150px;
    }

    footer {
      margin-top: 30px;
      padding: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

<header>
  <h1>ヘアーズ旬</h1>
  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<!-- サイドバー -->
<div id="sidebar">
  <a href="index.html">ヘアーズ旬</a>
  <a href="coconut.html">ココナッツ中山店</a>
  <a href="ryokuen.html">ビューティーライフ緑園店</a>
</div>

<img src="shun2.jpg">

<div class="container">

  <!-- 本店 -->
  <div class="shop">
    <h2>理容室 ヘアーズ旬</h2>
    <p>神奈川県 横浜市 瀬谷区　[最寄り：三ツ境駅]</p>

    <div class="btn-group">
      <a href="tel:0453677650" class="btn">電話で予約</a>
    </div>
  </div>

  <!-- 支店 -->
  <h2>支店｜美容室の紹介</h2>

  <div class="shop">
    <h2>美容室 ココナッツ中山店</h2>
    <p>神奈川県 横浜市 緑区　[最寄り：中山駅]</p>

    <div class="btn-group">
      <a href="tel:0459357066" class="btn">電話で予約</a>
    </div>

    <a href="coconut.html" class="btn subbtn">詳細はこちら</a>
  </div>

  <div class="shop">
    <h2>美容室 ビューティーライフ緑園店</h2>
    <p>神奈川県 横浜市 泉区　[最寄り：緑園都市駅・南万騎が原駅]</p>

    <div class="btn-group">
      <a href="tel:0454108700" class="btn">電話で予約</a>
      <a href="https://beauty.hotpepper.jp/slnH000435742/" class="btn">ホットペッパーで予約</a>
    </div>

    <a href="ryokuen.html" class="btn subbtn">詳細はこちら</a>
  </div>

</div>

<footer>
  © ヘアーズ旬
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const sidebar = document.getElementById('sidebar');

  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    sidebar.classList.toggle('active');
  });
</script>

</body>
</html>
