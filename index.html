<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ヘアーズ旬</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background-color: #f5f5f5;
  text-align: center;
  overflow-x: hidden; /* ←はみ出し防止 */
}

/* ===== ヘッダー ===== */
.overlay-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px 60px 20px 20px; /* ←右に余白作る */
  box-sizing: border-box;
  color: white;
  z-index: 300;
  transition: 0.3s;

  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay-header.scrolled {
  background: #cceeff;
}

.overlay-header h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: 2px;
}

/* ===== ハンバーガー（完全修正） ===== */
.hamburger {
  position: absolute;
  right: 15px; /* ←内側に配置 */
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 24px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.hamburger span {
  height: 4px;
  background: white;
  border-radius: 2px;
  transition: 0.3s;
}

/* ×（ズレ最小） */
.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(1px,1px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(2px,-2px);
}

/* ===== サイドバー ===== */
#sidebar {
  position: fixed;
  top: 0;
  right: -240px;
  width: 240px;
  height: 100%;
  background: white;
  box-shadow: -3px 0 10px rgba(0,0,0,0.2);
  transition: 0.4s ease;
  z-index: 400;
  padding-top: 80px;
  text-align: left;
}

#sidebar.active {
  right: 0;
}

#sidebar a {
  display: block;
  padding: 15px 20px;
  text-decoration: none;
  color: black;
  border-bottom: 1px solid #eee;
}

/* ×ボタン */
.close-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
}

/* ===== 背景暗く ===== */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
  z-index: 350;
}

#overlay.active {
  opacity: 1;
  visibility: visible;
}

/* ===== 画像 ===== */
.hero img {
  width: 100%;
  height: auto;
}

/* ===== コンテンツ ===== */
.container {
  padding: 20px;
}

/* フェードイン */
.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 0.6s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

.shop {
  background: white;
  margin: 20px auto;
  padding: 25px;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.shop p {
  font-size: 14px;
  color: #555;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-size: 14px;
}

.subbtn {
  background: #555;
}

.btn-group {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

/* ===== スマホ ===== */
@media screen and (max-width: 600px) {

  .overlay-header h1 {
    font-size: 20px;
  }

  .hamburger {
    width: 28px;
    height: 20px;
    right: 10px;
  }

  .shop {
    width: 95%;
  }

}
</style>
</head>

<body>

<!-- ヘッダー -->
<div class="overlay-header" id="header">
  <h1>ヘアーズ旬</h1>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- 背景 -->
<div id="overlay"></div>

<!-- サイドバー -->
<div id="sidebar">
  <div class="close-btn" id="closeBtn">×</div>

  <a href="index.html">ホーム</a>
  <a href="coconut.html">ココナッツ中山店</a>
  <a href="ryokuen.html">ビューティーライフ緑園店</a>
</div>

<!-- 画像 -->
<div class="hero">
  <img src="shun3.jpg">
</div>

<!-- コンテンツ -->
<div class="container">

  <div class="shop fade">
    <h2>理容室 ヘアーズ旬</h2>
    <p>神奈川県 横浜市 瀬谷区</p>
    <a href="tel:0453677650" class="btn">電話で予約</a>
  </div>

  <h2 class="fade">支店｜美容室の紹介</h2>

  <div class="shop fade">
    <h2>美容室 ココナッツ中山店</h2>
    <p>神奈川県 横浜市 緑区</p>
    <a href="tel:0459357066" class="btn">電話で予約</a>
    <br>
    <a href="coconut.html" class="btn subbtn">詳細はこちら</a>
  </div>

  <div class="shop fade">
    <h2>美容室 ビューティーライフ緑園店</h2>
    <p>神奈川県 横浜市 泉区</p>

    <div class="btn-group">
      <a href="tel:0454108700" class="btn">電話で予約</a>
      <a href="https://beauty.hotpepper.jp/slnH000435742/" class="btn">ホットペッパーで予約</a>
    </div>

    <a href="ryokuen.html" class="btn subbtn">詳細はこちら</a>
  </div>

</div>

<footer>
  © ヘアーズ旬
</footer>

<script>
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const closeBtn = document.getElementById('closeBtn');
const overlay = document.getElementById('overlay');
const header = document.getElementById('header');

/* 開閉 */
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  sidebar.classList.toggle('active');
  overlay.classList.toggle('active');
});

/* 閉じる */
function closeMenu(){
  sidebar.classList.remove('active');
  hamburger.classList.remove('active');
  overlay.classList.remove('active');
}

closeBtn.addEventListener('click', closeMenu);
overlay.addEventListener('click', closeMenu);

/* スクロール */
window.addEventListener('scroll', () => {
  if(window.scrollY > 50){
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
});

/* フェードイン */
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const rect = el.getBoundingClientRect().top;
    if(rect < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
