<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヘアーズ旬</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background-color: #f5f5f5;
  text-align: center;
}

/* ===== 画像 ===== */
.hero img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* ===== ヘッダー（今までの見た目維持） ===== */
.overlay-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 30px 20px;
  color: white;
  z-index: 200;
  transition: 0.3s;
}

/* スクロール後 */
.overlay-header.scrolled {
  background: black;
}

/* タイトル（今まで通り） */
.overlay-header h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: 2px;
  text-align: center;
}

/* ===== ハンバーガー ===== */
.hamburger {
  position: absolute;
  right: 20px;
  top: 20px;
  width: 30px;
  height: 25px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.hamburger span {
  height: 4px;
  background: white;
  border-radius: 2px;
  transition: 0.3s;
}

/* バツ */
.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px,5px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px,-6px);
}

/* ===== サイドバー（右から） ===== */
#sidebar {
  position: fixed;
  top: 0;
  right: -220px;
  width: 220px;
  height: 100%;
  background: white;
  box-shadow: -3px 0 10px rgba(0,0,0,0.2);
  transition: 0.3s;
  z-index: 150;
  padding-top: 80px;
  text-align: left;
}

#sidebar.active {
  right: 0;
}

#sidebar a {
  display: block;
  padding: 15px 20px;
  text-decoration: none;
  color: black;
  border-bottom: 1px solid #eee;
}

/* ===== コンテンツ ===== */
.container {
  padding: 20px;
}

.shop {
  background: white;
  margin: 20px auto;
  padding: 25px;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.shop h2 {
  margin-bottom: 10px;
}

.shop p {
  font-size: 14px;
  color: #555;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-size: 14px;
}

.subbtn {
  background: #555;
}

.btn-group {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.btn-group a {
  flex: 1;
  max-width: 150px;
}

footer {
  margin-top: 30px;
  padding: 20px;
  font-size: 12px;
  color: #999;
}
</style>
</head>

<body>

<!-- ===== ヘッダー（画像の上） ===== -->
<div class="overlay-header" id="header">
  <h1>ヘアーズ旬</h1>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- ===== サイドバー ===== -->
<div id="sidebar">
  <a href="index.html">ヘアーズ旬</a>
  <a href="coconut.html">ココナッツ中山店</a>
  <a href="ryokuen.html">ビューティーライフ緑園店</a>
</div>

<!-- ===== メイン画像 ===== -->
<div class="hero">
  <img src="shun3.jpg">
</div>

<!-- ===== コンテンツ ===== -->
<div class="container">

  <div class="shop">
    <h2>理容室 ヘアーズ旬</h2>
    <p>神奈川県 横浜市 瀬谷区</p>

    <div class="btn-group">
      <a href="tel:0453677650" class="btn">電話で予約</a>
    </div>
  </div>

  <h2>支店｜美容室の紹介</h2>

  <div class="shop">
    <h2>美容室 ココナッツ中山店</h2>
    <p>神奈川県 横浜市 緑区</p>

    <div class="btn-group">
      <a href="tel:0459357066" class="btn">電話で予約</a>
    </div>

    <a href="coconut.html" class="btn subbtn">詳細はこちら</a>
  </div>

  <div class="shop">
    <h2>美容室 ビューティーライフ緑園店</h2>
    <p>神奈川県 横浜市 泉区</p>

    <div class="btn-group">
      <a href="tel:0454108700" class="btn">電話で予約</a>
      <a href="https://beauty.hotpepper.jp/slnH000435742/" class="btn">ホットペッパーで予約</a>
    </div>

    <a href="ryokuen.html" class="btn subbtn">詳細はこちら</a>
  </div>

</div>

<footer>
  © ヘアーズ旬
</footer>

<script>
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const header = document.getElementById('header');

/* サイドバー開閉 */
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  sidebar.classList.toggle('active');
});

/* スクロールでヘッダー黒 */
window.addEventListener('scroll', () => {
  if(window.scrollY > 50){
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
});
</script>

</body>
</html>
