<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ヘアーズ旬</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

/* ===== ヒーロー画像 ===== */
.hero {
  position: relative;
}

.hero img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* ===== ヘッダー（最初は透明） ===== */
.overlay-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 200;
  transition: 0.3s;
}

/* スクロール後 */
.overlay-header.scrolled {
  background: black;
}

/* ロゴ中央 */
.overlay-header h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: 2px;
}

/* ===== ハンバーガー ===== */
.hamburger {
  position: absolute;
  right: 20px;
  top: 20px;
  width: 30px;
  height: 25px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.hamburger span {
  height: 4px;
  background: white;
  border-radius: 2px;
  transition: 0.3s;
}

/* バツに変形 */
.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px,5px);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px,-6px);
}

/* ===== サイドバー（右から） ===== */
#sidebar {
  position: fixed;
  top: 0;
  right: -220px;
  width: 220px;
  height: 100%;
  background: white;
  box-shadow: -3px 0 10px rgba(0,0,0,0.2);
  transition: 0.3s;
  z-index: 150;
  padding-top: 80px;
}

#sidebar.active {
  right: 0;
}

#sidebar a {
  display: block;
  padding: 15px 20px;
  text-decoration: none;
  color: black;
  border-bottom: 1px solid #eee;
}

/* ===== 下のコンテンツ ===== */
.container {
  padding: 20px;
  text-align: center;
}

.shop {
  background: white;
  margin: 20px auto;
  padding: 25px;
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 30px;
}
</style>
</head>

<body>

<!-- ===== ヘッダー ===== -->
<div class="overlay-header" id="header">
  <h1>ヘアーズ旬</h1>

  <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<!-- ===== サイドバー ===== -->
<div id="sidebar">
  <a href="index.html">ホーム</a>
  <a href="coconut.html">ココナッツ中山店</a>
  <a href="ryokuen.html">緑園店</a>
</div>

<!-- ===== 画像 ===== -->
<div class="hero">
  <img src="shun1.jpg">
</div>

<!-- ===== コンテンツ ===== -->
<div class="container">

  <div class="shop">
    <h2>理容室 ヘアーズ旬</h2>
    <p>横浜市 瀬谷区</p>
    <a href="tel:0453677650" class="btn">電話で予約</a>
  </div>

</div>

<script>
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const header = document.getElementById('header');

/* サイドバー */
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  sidebar.classList.toggle('active');
});

/* スクロールでヘッダー変化 */
window.addEventListener('scroll', () => {
  if(window.scrollY > 50){
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
});
</script>

</body>
</html>
